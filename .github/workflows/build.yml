name: Build and Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Verify .NET installation
      run: |
        dotnet --version
        dotnet --list-sdks
    
    - name: Restore NuGet packages
      working-directory: ./src
      run: dotnet restore ClipPanda.csproj
    
    - name: Build Release
      working-directory: ./src
      run: dotnet build ClipPanda.csproj -c Release --no-restore
    
    - name: Publish self-contained exe
      working-directory: ./src
      shell: pwsh
      run: |
        dotnet publish ClipPanda.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ../publish
        # 复制 Assets 目录到发布目录
        if (!(Test-Path ../publish/Assets)) { New-Item -ItemType Directory -Path ../publish/Assets }
        Copy-Item -Path Assets/* -Destination ../publish/Assets/ -Recurse -Force
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ClipPanda-v${{ github.run_number }}
        path: ./publish/
        retention-days: 30
    
    - name: Upload exe only
      uses: actions/upload-artifact@v4
      with:
        name: ClipPanda-Win64
        path: ./publish/ClipPanda.exe
        retention-days: 30
