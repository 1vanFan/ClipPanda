name: Build and Release

on:
  push:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
    
    - name: Verify .NET installation
      run: |
        dotnet --version
        dotnet --list-sdks
    
    - name: Restore NuGet packages
      working-directory: ./src
      run: dotnet restore ClipPanda.csproj
    
    - name: Build Release
      working-directory: ./src
      run: dotnet build ClipPanda.csproj -c Release --no-restore
    
    - name: Publish self-contained exe
      working-directory: ./src
      run: |
        dotnet publish ClipPanda.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ../publish
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ClipPanda-Win64
        path: ./publish/ClipPanda.exe
        retention-days: 30
    
    - name: Create Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: ./publish/ClipPanda.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  download:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Download exe
      uses: actions/download-artifact@v4
      with:
        name: ClipPanda-Win64
        path: ./download
    
    - name: List files
      run: ls -la ./download
    
    - name: Create download info
      run: |
        echo "# ClipPanda 下载说明" > ./download/README.md
        echo "" >> ./download/README.md
        echo "## 下载文件" >> ./download/README.md
        echo "- ClipPanda.exe - Windows x64 可执行文件" >> ./download/README.md
        echo "" >> ./download/README.md
        echo "## 使用方法" >> ./download/README.md
        echo "1. 下载 ClipPanda.exe" >> ./download/README.md
        echo "2. 双击运行即可" >> ./download/README.md
        echo "3. 按 Ctrl+\` 唤出剪贴板面板" >> ./download/README.md
        echo "" >> ./download/README.md
        echo "## 功能" >> ./download/README.md
        echo "- 自动记录剪贴板历史" >> ./download/README.md
        echo "- 关键字搜索" >> ./download/README.md
        echo "- 收藏常用内容" >> ./download/README.md
        echo "- 熊猫图标" >> ./download/README.md
        
    - name: Upload download package
      uses: actions/upload-artifact@v4
      with:
        name: ClipPanda-Download
        path: ./download
        retention-days: 7
